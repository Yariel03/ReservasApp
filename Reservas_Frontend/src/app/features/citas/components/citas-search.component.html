<mat-card class="feature-card">
  <div class="loading-overlay" *ngIf="loading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <mat-card-header>
    <mat-card-title>Historial de Consultas</mat-card-title>
  </mat-card-header>
  
  <mat-card-content>
    <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="vertical-form">
      <mat-form-field appearance="outline">
        <mat-label>Número de Placa</mat-label>
        <input matInput formControlName="placa" placeholder="PDF-1234" maxlength="8" (input)="onPlacaInput($event)">
        <mat-hint>Formato: XXX-0000</mat-hint>
        <mat-error *ngIf="searchForm.get('placa')?.invalid">Placa inválida</mat-error>
      </mat-form-field>
      
      <div class="button-group">
        <button mat-raised-button color="primary" type="submit" class="action-button search-btn" [disabled]="searchForm.invalid || loading">
          BUSCAR CITAS
        </button>
        <button mat-stroked-button color="warn" type="button" class="action-button clear-btn" (click)="onClear()" [disabled]="loading">
          LIMPIAR
        </button>
      </div>
    </form>

    <div class="results-container" *ngIf="searched">
      <h3 class="results-title" *ngIf="citas.length > 0">Citas encontradas para: {{currentPlaca}}</h3>
      
      <ul class="appointments-list" *ngIf="citas.length > 0">
        @for (cita of citas; track cita.id) {
          <li class="appointment-item mat-elevation-z2">
            <div class="item-placa">{{cita.placa}}</div>
            <div class="item-date">{{cita.fechaHora | date:'EEEE, d MMMM y, HH:mm'}}</div>
          </li>
        }
      </ul>

      <div class="empty-state" *ngIf="citas.length === 0">
        <p>No existen citas registradas para este vehículo.</p>
      </div>
    </div>
  </mat-card-content>
</mat-card>
